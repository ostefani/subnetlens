# .goreleaser.yaml
# GoReleaser v2 configuration for subnetlens
# Docs: https://goreleaser.com/customization/

version: 2

before:
    hooks:
        - go mod tidy

builds:
    - id: subnetlens
      binary: subnetlens
      main: .
      env:
          - CGO_ENABLED=0
      goos:
          - linux
          - darwin
          - windows
      goarch:
          - amd64
          - arm64
      ignore:
          - goos: windows
            goarch: arm64
      ldflags:
          - -s -w
          - -X main.version={{.Version}}
          - -X main.commit={{.Commit}}
          - -X main.date={{.Date}}

archives:
    - id: subnetlens
      builds:
          - subnetlens
      name_template: >-
          {{ .ProjectName }}_
          {{- .Version }}_
          {{- .Os }}_
          {{- if eq .Arch "amd64" }}x86_64
          {{- else if eq .Arch "arm64" }}arm64
          {{- else }}{{ .Arch }}{{ end }}
      format_overrides:
          - goos: windows
            formats: ['zip']
      files:
          - README.md
          - LICENSE
          - CONTRIBUTING.md

checksum:
    name_template: 'checksums.txt'

changelog:
    sort: asc
    use: github
    filters:
        exclude:
            - '^docs:'
            - '^test:'
            - '^chore:'
            - '^ci:'
            - Merge pull request
            - Merge branch
    groups:
        - title: '🚀 New Features'
          regexp: '^feat'
          order: 0
        - title: '🐛 Bug Fixes'
          regexp: '^fix'
          order: 1
        - title: '⚡ Performance'
          regexp: '^perf'
          order: 2
        - title: '🔒 Security'
          regexp: '^(sec|security)'
          order: 3
        - title: 'Other'
          order: 999

release:
    github:
        owner: ostefani
        name: subnetlens
    draft: false
    prerelease: auto
    name_template: 'v{{ .Version }}'
    header: |
        ## SubnetLens {{ .Tag }}

        A fast, concurrent network scanner. Available for Linux, macOS, and Windows.

        > ⚠️ **Note:** ICMP and ARP scanning require elevated privileges (`sudo` on Linux/macOS, Administrator on Windows).
